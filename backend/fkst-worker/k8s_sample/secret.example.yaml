# TEMPLATE ONLY — placeholder, never a real credential.
#
# This file is deliberately NOT listed in kustomization.yaml, so `apply -k` can
# never overwrite the real Secret with this placeholder.
#
# This is the WORKER Secret (fkst-worker-secret). The worker holds NO Mongo /
# DB / GitHub-App creds — its only secret is the shared controller<->worker
# bearer FKST_INTERNAL_AUTH_TOKEN, which it presents on every internal request
# to the controller.
#
# Create the real Secret BEFORE `apply -k` (preferred — nothing touches disk):
#   TOK="$(openssl rand -hex 32)"   # MUST equal the control-plane Secret's value
#   kubectl -n fkst-hosted create secret generic fkst-worker-secret \
#     --from-literal=FKST_INTERNAL_AUTH_TOKEN="$TOK"
#
# CONSISTENCY RULE: FKST_INTERNAL_AUTH_TOKEN MUST equal the control plane's
# fkst-control-plane-secret FKST_INTERNAL_AUTH_TOKEN, or the controller rejects
# the worker's internal requests.
apiVersion: v1
kind: Secret
metadata:
  name: fkst-worker-secret
  namespace: fkst-hosted
  labels:
    app.kubernetes.io/name: fkst-worker
    app.kubernetes.io/part-of: fkst-hosted
type: Opaque
stringData:
  # REQUIRED, fail-closed. openssl rand -hex 32; must equal the controller's value.
  FKST_INTERNAL_AUTH_TOKEN: "CHANGE_ME"
