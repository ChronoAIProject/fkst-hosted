# ==========================================================================
# SAMPLE ONLY — topology finalized by #144 (deployment topology) / #140 (worker
# HPA + drain). This HorizontalPodAutoscaler is a placeholder showing the SHAPE
# of pending-work autoscaling, NOT the real wiring. The `fkst_pending_work`
# metric and its source (a metrics adapter / Prometheus + custom-metrics API)
# are owned by #144/#140; this file will be replaced when they land. Applying it
# as-is requires a custom-metrics provider that publishes `fkst_pending_work`.
# ==========================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fkst-worker
  namespace: fkst-hosted
  labels:
    app.kubernetes.io/name: fkst-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: fkst-hosted
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fkst-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    # Scale on the controller-reported backlog of pending work per worker.
    # `fkst_pending_work` is a SAMPLE metric name — #144/#140 define the real one.
    - type: Pods
      pods:
        metric:
          name: fkst_pending_work
        target:
          type: AverageValue
          averageValue: "4"
  behavior:
    scaleDown:
      # Conservative scale-down so a worker is not reaped mid-session; the real
      # drain policy is owned by #140.
      stabilizationWindowSeconds: 300
