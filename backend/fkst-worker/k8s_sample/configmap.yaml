# Non-secret runtime configuration for the WORKER — SAMPLE values.
#
# Canonical source of truth: backend/fkst-worker/src/config.rs (and the log-init
# in backend/fkst-worker/src/run.rs for FKST_HOSTED_LOG_LEVEL). The worker holds
# NO Mongo / DB / lease / auth / GitHub-App config — only the keys below plus the
# REQUIRED FKST_INTERNAL_AUTH_TOKEN Secret (secret.example.yaml).
#
# IMAGE-BAKED ENV — set by the Dockerfile, NOT by any manifest, so do not add
# them here:
#   FKST_ROLE=worker; FKST_RUNTIME_ROOT=/var/lib/fkst/runtime (read by the loader
#   as `engine_temp_root`); FKST_HOSTED_PORT / FKST_HOSTED_BIND_ADDR.
#   FKST_POD_ID (= worker_id, REQUIRED, fail-closed) is downward-API only
#   (Deployment env fieldRef metadata.name). NOT set here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fkst-worker-config
  namespace: fkst-hosted
  labels:
    app.kubernetes.io/name: fkst-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: fkst-hosted
data:
  # tracing-subscriber EnvFilter directive.
  FKST_HOSTED_LOG_LEVEL: "info,fkst_worker=debug"
  # REQUIRED, fail-closed: the stable controller Service DNS the worker pulls
  # work from (the public ClusterIP Service is `fkst-hosted` on port 80).
  CONTROLLER_URL: "http://fkst-hosted:80"
  # Worker-local HTTP server (GET /health). Defaults baked into the loader.
  FKST_WORKER_BIND_ADDR: "0.0.0.0"
  FKST_WORKER_PORT: "8090"
  # Work-pull cadence (seconds). >= 1.
  FKST_WORKER_PULL_INTERVAL_SECS: "5"
  # Max concurrent engine sessions accepted.
  FKST_WORKER_CAPACITY: "4"
  # Graceful-drain deadline (seconds) for SIGTERM / preStop. MUST stay strictly
  # below the Deployment's terminationGracePeriodSeconds (30) so the kubelet
  # never SIGKILLs mid-drain. Default 25.
  FKST_WORKER_DRAIN_GRACE_SECS: "25"
  # --- Engine runner (FKST_HOSTED_ENGINE_*) — apply once the worker drives the
  # engine (#151). Mirror the control-plane ConfigMap's engine block here then.
  # FKST_HOSTED_ENGINE_FRAMEWORK_BIN: "/usr/local/bin/fkst-framework"
  # FKST_HOSTED_ENGINE_STOP_GRACE_SECS: "10"
  # ... (see backend/fkst-control-plane/k8s_sample/configmap.yaml for the full set)
