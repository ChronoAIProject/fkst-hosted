# fkst-worker: the worker deployable of the control-plane/worker split.
# SAMPLE manifest — every value here is an example; the worker config loader
# (backend/fkst-worker/src/config.rs) is the canonical source of truth.
#
# It exposes NO public Service — workers connect UP to the controller over
# stable Service DNS (CONTROLLER_URL, from the ConfigMap) and pull work. It runs
# a worker-LOCAL HTTP server on FKST_WORKER_PORT (8090) serving GET /health
# (backend/fkst-worker/src/server.rs) — used by the probes below, NOT exposed
# via any Service. The worker holds NO Mongo/DB/GitHub-App creds; the only
# secret it needs is the shared controller<->worker bearer
# FKST_INTERNAL_AUTH_TOKEN (from fkst-worker-secret). Per-session NyxID tokens
# are injected at session time, not pod-level.
#
# It runs the engine-laden `fkst-worker` image and keeps the runtime+tmp
# emptyDir volumes so it can host engine child processes (live once #151 moves
# engine execution onto the worker). Workers scale freely — the HPA + drain/PDB
# topology is finalized by #144/#140; the hpa.yaml + pdb.yaml here are samples.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fkst-worker
  namespace: fkst-hosted
  labels:
    app.kubernetes.io/name: fkst-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: fkst-hosted
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fkst-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fkst-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: fkst-hosted
    spec:
      # No service-link env injection — the worker's env comes only from the
      # image + ConfigMap (+ Secret once #134 wires the internal-auth token).
      enableServiceLinks: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: fkst-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: fkst-worker
          image: fkst-worker:dev # tag managed by kustomization.yaml images
          imagePullPolicy: IfNotPresent
          # Worker-local HTTP server (GET /health). NOT fronted by any Service —
          # the named port exists only so the probes below can target it.
          ports:
            - name: http
              containerPort: 8090 # = FKST_WORKER_PORT (ConfigMap)
          # Pod identity: the worker id is sourced explicitly from the downward
          # API (FKST_POD_ID = metadata.name) — the preferred, exact value. If a
          # deployment cannot wire this, the worker falls back to the container
          # HOSTNAME (also the pod name), so it still starts. FKST_ROLE is
          # image-baked; pinned here as defense-in-depth.
          env:
            - name: FKST_ROLE
              value: worker
            - name: FKST_POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          # The worker does NOT connect to MongoDB. CONTROLLER_URL + the worker
          # tunables come from fkst-worker-config; the REQUIRED, fail-closed
          # shared bearer FKST_INTERNAL_AUTH_TOKEN comes from fkst-worker-secret.
          envFrom:
            - configMapRef:
                name: fkst-worker-config
            - secretRef:
                name: fkst-worker-secret
          # The worker-local /health server (server.rs) does no store I/O, so the
          # probes are cheap and the worker is Ready as soon as it is listening.
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 2
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Root FS is read-only, so every writable path is an explicit
          # emptyDir. Engine runtime state is LOCAL and intentionally ephemeral
          # (redo-from-GitHub-truth model) — never a PVC.
          volumeMounts:
            - name: runtime
              mountPath: /var/lib/fkst/runtime # = FKST_RUNTIME_ROOT (image env)
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: runtime
          emptyDir: {}
        - name: tmp
          emptyDir: {}
