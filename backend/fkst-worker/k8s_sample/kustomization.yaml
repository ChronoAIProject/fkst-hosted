# `kubectl apply -k backend/fkst-worker/k8s_sample` brings up the worker fleet.
# Convenience entry — the directory is primarily the authoritative SAMPLE set;
# backend/fkst-worker/src/config.rs is the source of truth for keys.
#
# secret.example.yaml is DELIBERATELY excluded: the real fkst-worker-secret is
# created by the operator first (see secret.example.yaml header), and an apply
# must never overwrite it with a placeholder.
#
# The `fkst-hosted` Namespace is declared by the control-plane dir
# (backend/fkst-control-plane/k8s_sample/namespace.yaml); apply that first (or
# `kubectl create namespace fkst-hosted`) so this kustomization has somewhere to
# land. hpa.yaml + pdb.yaml are SAMPLES (#144/#140 own the real topology).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fkst-hosted
resources:
  - configmap.yaml
  - deployment.yaml
  - hpa.yaml
  - pdb.yaml
# Image-tag seam: change the deployed worker tag in one place. The worker image
# is engine-laden (needs FKST_SUBSTRATE_REF at build time).
images:
  - name: fkst-worker
    newTag: dev
# Replica edit-point. The worker fleet scales freely; the HPA (#140) governs the
# live range — this count is the floor a fresh apply starts from.
replicas:
  - name: fkst-worker
    count: 2
