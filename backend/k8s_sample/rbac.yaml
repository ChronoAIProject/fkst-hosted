# RBAC for pod-per-session execution. The control-plane reconciler creates +
# reconciles + GCs one long-lived Pod (+ its 0400 per-session Secret) per
# substrate session, in its OWN namespace (FKST_POD_NAMESPACE = downward-API
# metadata.namespace). All objects are namespace-agnostic so kustomize sets the
# namespace for everything.
---
# The control plane runs as this ServiceAccount (Deployment serviceAccountName).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fkst-control-plane
  labels:
    app.kubernetes.io/name: fkst-control-plane
    app.kubernetes.io/part-of: fkst-hosted
---
# Session pods AND env-validation pods run as this ServiceAccount
# (FKST_POD_SERVICE_ACCOUNT). It is DELIBERATELY zero-RBAC: it has NO Role and NO
# RoleBinding, and one must NEVER be added (#338 R3 hard rule). Combined with the
# pods' automountServiceAccountToken:false, even a leaked identity grants nothing.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fkst-session-runner
  labels:
    app.kubernetes.io/part-of: fkst-hosted
    app.kubernetes.io/component: session-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fkst-pod-launcher
  labels:
    app.kubernetes.io/part-of: fkst-hosted
rules:
  # Per-session credentials: created before the Pod, mounted 0400, ownerReferenced
  # to the Pod for cascade GC; the token key is patched in place by the rotation
  # loop. ALSO backs the named-environment secret store (`fkst-env-<id>-<name>`
  # Secret, #338).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]
  # Named-environment store: one `fkst-env-<id>-<name>` ConfigMap per environment
  # (#338), created/read/deleted via the GitHub-token environments API.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]
  # One long-lived Pod per session: the reconciler creates/lists/watches them,
  # patches the last-pending annotation, and deletes them for idle-kill /
  # deregister. Also create/delete the ephemeral env-VALIDATION pod that runs an
  # environment's install commands before it is persisted (#338 R2). These verbs
  # belong to the CONTROL PLANE SA only — never to `fkst-session-runner`, which
  # stays zero-RBAC (see above).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  # Read the validation pod's logs to capture the per-command install verdict,
  # and poll its status subresource for the terminal phase (env_validator uses
  # `pods.get_status`). Both are read-only on the launcher's own pods.
  - apiGroups: [""]
    resources: ["pods/log", "pods/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fkst-pod-launcher
  labels:
    app.kubernetes.io/part-of: fkst-hosted
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fkst-pod-launcher
subjects:
  - kind: ServiceAccount
    name: fkst-control-plane
