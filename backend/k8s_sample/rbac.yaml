# RBAC for pod-per-session execution. The control plane spawns + watches + GCs
# one Job (+ its 0400 per-session Secret) per substrate session, in its OWN
# namespace (FKST_POD_NAMESPACE = downward-API metadata.namespace). All objects
# are namespace-agnostic so kustomize sets the namespace for everything.
---
# The control plane runs as this ServiceAccount (Deployment serviceAccountName).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fkst-control-plane
  labels:
    app.kubernetes.io/name: fkst-control-plane
    app.kubernetes.io/part-of: fkst-hosted
---
# Session Job pods run as this ServiceAccount (FKST_POD_SERVICE_ACCOUNT).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fkst-session-runner
  labels:
    app.kubernetes.io/part-of: fkst-hosted
    app.kubernetes.io/component: session-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fkst-pod-launcher
  labels:
    app.kubernetes.io/part-of: fkst-hosted
rules:
  # Per-session credentials: created before the Job, mounted 0400, patched to
  # rotate the short-lived NyxID token; ownerReferenced to the Job for cascade GC.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]
  # One Job per session: created, watched to completion, GC'd via
  # ttlSecondsAfterFinished (delete kept for explicit teardown / the stop route).
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Read pod status for richer failure diagnostics + the rich session GET view.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fkst-pod-launcher
  labels:
    app.kubernetes.io/part-of: fkst-hosted
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fkst-pod-launcher
subjects:
  - kind: ServiceAccount
    name: fkst-control-plane
