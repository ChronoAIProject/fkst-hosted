# Non-secret runtime config for the control plane — SAMPLE values.
# Canonical source of truth: backend/src/config.rs (+ github_app/config.rs).
#
# Image-baked (do NOT set here): FKST_HOSTED_PORT=8080, FKST_HOSTED_BIND_ADDR=0.0.0.0.
# Downward-API (set in the Deployment, not here): FKST_POD_ID (metadata.name),
# FKST_POD_NAMESPACE (metadata.namespace) — session Jobs land in the control
# plane's own namespace.
# Secret keys live in secret.example.yaml (fkst-control-plane-secret).
apiVersion: v1
kind: ConfigMap
metadata:
  name: fkst-control-plane-config
  labels:
    app.kubernetes.io/name: fkst-control-plane
    app.kubernetes.io/part-of: fkst-hosted
data:
  # --- HTTP / server ---
  FKST_HOSTED_LOG_LEVEL: "info,fkst_control_plane=debug,tower_http=info"
  FKST_HOSTED_REQUEST_TIMEOUT_SECS: "30" # >= 1

  # --- Auth: NyxID proxy-trust identity (decode-only; no JWKS / token verify).
  # When FKST_AUTH_ENABLED=true, FKST_AUTH_NYXID_BASE_URL is required. ---
  FKST_AUTH_ENABLED: "true"
  FKST_AUTH_NYXID_BASE_URL: "http://nyxid-backend.ornn-cluster:3001"
  FKST_NYXID_ORG_CACHE_TTL_SECS: "30" # >= 1
  # Per-session NyxID agent-key TTL (self-expires; no SA revoke). >= 1.
  FKST_SESSION_KEY_TTL_SECS: "86400"
  # Slug of the NyxID GitHub proxy service. Non-blank (fail-closed).
  FKST_NYXID_GITHUB_PROXY_SLUG: "api-github"

  # --- Codex / chrono-llm (reached via the NyxID proxy) ---
  FKST_HOSTED_CODEX_MODEL: "gpt-5-codex" # non-blank (fail-closed)
  FKST_HOSTED_CHRONO_LLM_BASE_URL: "http://nyxid-backend.ornn-cluster:3001/api/v1/proxy/s/chrono-llm"

  # --- Session trigger ---
  # Only a GitHub issues.opened carrying this label auto-triggers a session.
  FKST_WEBHOOK_TRIGGER_LABEL: "fkst"

  # --- Pod-per-session dispatch (one K8s Job per substrate session) ---
  # FKST_POD_IMAGE is the SAME image this control plane runs; the session Job
  # re-execs it in `run-session` mode. Keep it in lockstep with the Deployment's
  # image (kustomization.yaml `images:`).
  FKST_POD_DISPATCH: "true"
  FKST_POD_IMAGE: "fkst-control-plane:dev"
  FKST_POD_SERVICE_ACCOUNT: "fkst-session-runner"
  FKST_POD_RUN_TTL_SECS: "600" # ttlSecondsAfterFinished; > 0
  FKST_POD_ACTIVE_DEADLINE_SECS: "7200" # activeDeadlineSeconds; > 0
