# PodDisruptionBudget for the control plane. It is a SINGLE authoritative replica
# (the pod-per-session Job watcher is single-writer), so there is no multi-pod
# floor to guard — `minAvailable: 2` would be unsatisfiable and wedge every
# voluntary disruption. `maxUnavailable: 1` explicitly ALLOWS the single pod to be
# evicted/recycled during a node drain; a brief gap is acceptable (running session
# Jobs are independent of the control plane, and the restarted pod reconnects to
# the live Jobs via the watch). Namespace is set by kustomize.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fkst-control-plane
  labels:
    app.kubernetes.io/name: fkst-control-plane
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: fkst-hosted
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fkst-control-plane
