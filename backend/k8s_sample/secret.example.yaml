# TEMPLATE ONLY — placeholders, never real credentials.
#
# Deliberately NOT listed in kustomization.yaml, so `kubectl apply -k` can never
# overwrite a real Secret with these placeholders. The control-plane Secret holds
# the (optional) GitHub App credentials and (optional) NyxID broker client.
#
# Create the real Secret BEFORE `apply -k` (preferred — nothing touches disk):
#   kubectl -n <ns> create secret generic fkst-control-plane-secret \
#     --from-literal=FKST_GITHUB_APP_ID="123456" \
#     --from-literal=FKST_GITHUB_APP_WEBHOOK_SECRET="$(openssl rand -hex 32)" \
#     --from-file=FKST_GITHUB_APP_PRIVATE_KEY_PEM=/path/to/app-private-key.pem
#
# Without the GitHub App the control plane still runs (read/stop API, health,
# /openapi.json), but the webhook trigger + Job watcher are NOT mounted, so no
# session can be auto-triggered. An empty Secret is fine until you add the App.
apiVersion: v1
kind: Secret
metadata:
  name: fkst-control-plane-secret
  labels:
    app.kubernetes.io/name: fkst-control-plane
    app.kubernetes.io/part-of: fkst-hosted
type: Opaque
stringData:
  # --- GitHub App (enables the webhook trigger + Job watcher) ---
  # FKST_GITHUB_APP_ID: "CHANGE_ME"
  # FKST_GITHUB_APP_SLUG: "fkst-hosted"
  # Inline PEM with literal \n escapes (mutually exclusive with _PRIVATE_KEY_PATH):
  # FKST_GITHUB_APP_PRIVATE_KEY_PEM: "-----BEGIN RSA PRIVATE KEY-----\nCHANGE_ME\n-----END RSA PRIVATE KEY-----"
  # Webhook HMAC secret (without it the webhook route is not mounted):
  # FKST_GITHUB_APP_WEBHOOK_SECRET: "CHANGE_ME"

  # --- NyxID broker OAuth client (connect-at-install; all three or none) ---
  # FKST_NYXID_BROKER_CLIENT_ID: "CHANGE_ME"
  # FKST_NYXID_BROKER_CLIENT_SECRET: "CHANGE_ME"
  # FKST_NYXID_BROKER_REDIRECT_URI: "https://<host>/api/v1/nyxid/connect/callback"
