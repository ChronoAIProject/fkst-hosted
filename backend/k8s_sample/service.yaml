# ClusterIP only — no Ingress (mirrors the proxy-trust isolation model): the
# control plane is reachable in-cluster (NyxID proxy / the GitHub-App webhook via
# a relay) but never directly by a public client.
# Local access: kubectl -n <ns> port-forward svc/fkst-control-plane 8080:80
apiVersion: v1
kind: Service
metadata:
  name: fkst-control-plane
  labels:
    app.kubernetes.io/name: fkst-control-plane
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: fkst-hosted
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fkst-control-plane
  ports:
    - name: http
      port: 80
      targetPort: http
