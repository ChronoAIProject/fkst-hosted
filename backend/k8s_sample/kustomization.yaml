# `kubectl apply -k backend/k8s_sample` brings up the
# datastore-free control-plane stack (plus the shared Namespace). This is a
# convenience entry — the directory is primarily the authoritative SAMPLE set;
# the config loaders are the source of truth for keys.
#
# The controller is datastore-free (#143): there is no MongoDB Service /
# StatefulSet to apply, no DB Secret, and no `wait-for-mongodb` ordering. The
# single authoritative controller rebuilds its in-memory state on restart from
# the live workers' self-reports and the claimed goal-issue labels.
#
# secret.example.yaml is DELIBERATELY excluded: the real fkst-control-plane-secret
# is created by the operator first (see secret.example.yaml header), and an
# apply must never overwrite it with placeholders.
#
# namespace.yaml is shared by both deployables; applying it here is harmless and
# idempotent (the worker dir's kustomization does not re-declare it).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fkst-hosted
resources:
  - namespace.yaml
  - configmap.yaml
  - service.yaml
  - deployment.yaml
  - pdb.yaml
# Image-tag seam: change the deployed control-plane tag in one place.
# TRANSITIONAL until #151: the control plane still drives the engine, so point
# this at the engine-laden `fkst-worker` image (with a command override) until
# engine execution moves to the worker; then switch back to the slim
# `fkst-control-plane` image. See deployment.yaml header.
images:
  - name: fkst-control-plane
    newTag: dev
# Replica edit-point. The database-free pivot (#143/#144) makes this a SINGLE
# authoritative controller (the claim authority is in-memory and single-writer),
# so the controller runs as exactly one replica. The worker fleet — not the
# controller — is what scales horizontally (see backend/fkst-worker/k8s_sample,
# with its HPA).
replicas:
  - name: fkst-control-plane
    count: 1
