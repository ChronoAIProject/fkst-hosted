# `kubectl apply -k backend/k8s_sample` brings up the single control-plane
# deployable + the pod-per-session RBAC. This directory is the authoritative
# SAMPLE set; backend/src/config.rs is the source of truth for the env keys.
#
# secret.example.yaml is DELIBERATELY excluded: create the real
# fkst-control-plane-secret first (see its header), so an apply never overwrites
# it with placeholders. namespace.yaml is excluded too — the sample deploys into
# an EXISTING namespace (set below); apply namespace.yaml separately for a
# dedicated namespace.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Deploy target namespace (sessions run here too, via downward-API
# FKST_POD_NAMESPACE). Change to match your cluster.
namespace: ornn-cluster
resources:
  - rbac.yaml
  - configmap.yaml
  - service.yaml
  - deployment.yaml
  - pdb.yaml
# Image seam: one image runs BOTH the control plane and each session pod
# (`run-session`). Keep FKST_POD_IMAGE in configmap.yaml in lockstep.
images:
  - name: fkst-control-plane
    newTag: dev
# Single authoritative control plane (the Job watcher is single-writer).
replicas:
  - name: fkst-control-plane
    count: 1
