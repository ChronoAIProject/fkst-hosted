# fkst-control-plane: the single control-plane deployable (public REST API +
# pod-per-session dispatcher). SAMPLE manifest — backend/src/config.rs is the
# canonical env contract.
#
# One image (kustomization.yaml `images:`) carries the control-plane binary AND
# the engine + codex + nyxid CLI: the control plane runs it as the API server,
# and each session Pod re-execs the SAME image in `run-substrate` mode. The
# control plane never runs the engine in-process — its reconciler runs one
# long-lived Kubernetes Pod per session (see rbac.yaml) and reads pod status for
# the rich session view.
#
# Single replica + Recreate: the reconciler is single-writer, so a surging
# second pod would double-drive label/comment updates. Recreate terminates the
# old pod before starting the new one.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fkst-control-plane
  labels:
    app.kubernetes.io/name: fkst-control-plane
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: fkst-hosted
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: fkst-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fkst-control-plane
        app.kubernetes.io/component: control-plane
        app.kubernetes.io/part-of: fkst-hosted
    spec:
      serviceAccountName: fkst-control-plane
      # Keep OFF: sibling Services in the namespace would otherwise inject
      # <NAME>_SERVICE_* env that can collide with the FKST_* config prefixes.
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: fkst-control-plane
          image: fkst-control-plane:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            # Pod identity + the namespace session Jobs are created in, both from
            # the downward API so they always match this pod.
            - name: FKST_POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: FKST_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: fkst-control-plane-config
            - secretRef:
                name: fkst-control-plane-secret
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 2"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Root FS is read-only; the baked FKST_RUNTIME_ROOT + /tmp are the only
          # writable paths and are intentionally ephemeral emptyDirs.
          volumeMounts:
            - name: runtime
              mountPath: /var/lib/fkst/runtime
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 2
            timeoutSeconds: 7
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 7
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: runtime
          emptyDir: {}
        - name: tmp
          emptyDir: {}
