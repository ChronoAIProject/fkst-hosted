# TEMPLATE ONLY — placeholders, never real credentials.
#
# This file is deliberately NOT listed in kustomization.yaml, so
# `kubectl apply -k` can never overwrite a real Secret with placeholders.
#
# To create the real Secret, either:
#   a) copy this file to secret.yaml (git-ignored), replace every CHANGE_ME,
#      and `kubectl apply -f backend/deploy/k8s/secret.yaml`; or
#   b) create it directly (preferred — nothing touches disk):
#        PW="$(openssl rand -hex 16)"
#        kubectl -n fkst-hosted create secret generic fkst-hosted-secret \
#          --from-literal=MONGO_INITDB_ROOT_USERNAME=root \
#          --from-literal=MONGO_INITDB_ROOT_PASSWORD="$PW" \
#          --from-literal=MONGODB_URI="mongodb://root:${PW}@mongodb-0.mongodb:27017/fkst_hosted?authSource=admin"
#
# CONSISTENCY RULE: the username:password embedded in MONGODB_URI MUST equal
# MONGO_INITDB_ROOT_USERNAME / MONGO_INITDB_ROOT_PASSWORD. A mismatch is the
# single most common bring-up failure (API stays NotReady with auth errors).
apiVersion: v1
kind: Secret
metadata:
  name: fkst-hosted-secret
  namespace: fkst-hosted
  labels:
    app.kubernetes.io/name: fkst-hosted
    app.kubernetes.io/part-of: fkst-hosted
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "root"
  MONGO_INITDB_ROOT_PASSWORD: "CHANGE_ME"
  # Short-form host (mongodb-0.mongodb) resolves via the pod's DNS search
  # path, so the URI works in any namespace the stack is deployed to.
  MONGODB_URI: "mongodb://root:CHANGE_ME@mongodb-0.mongodb:27017/fkst_hosted?authSource=admin"
  # NyxID service-account credentials for org APIs. Both-or-neither: only
  # one set is a config error. Without these, org features degrade
  # gracefully (owner-only authorization).
  NYXID_CLIENT_ID: "CHANGE_ME"
  NYXID_CLIENT_SECRET: "CHANGE_ME"
  # GitHub App private key PEM (optional; inline with literal \n escapes).
  # Mutually exclusive with FKST_GITHUB_APP_PRIVATE_KEY_PATH in the ConfigMap.
  # FKST_GITHUB_APP_PRIVATE_KEY_PEM: "-----BEGIN RSA PRIVATE KEY-----\nCHANGE_ME\n-----END RSA PRIVATE KEY-----"
