# ClusterIP only — nothing is exposed outside the cluster, and there is NO
# Ingress (mirrors Ornn's downstream isolation). This network isolation is the
# security backbone of the proxy-trust auth model (issue #113): fkst-hosted
# trusts the NyxID-proxy-injected identity precisely because it is reachable
# ONLY via the in-cluster NyxID proxy, never directly by a public client.
# Local access is `kubectl -n fkst-hosted port-forward svc/fkst-hosted 8080:80`.
apiVersion: v1
kind: Service
metadata:
  name: fkst-hosted
  namespace: fkst-hosted
  labels:
    app.kubernetes.io/name: fkst-hosted-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: fkst-hosted
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fkst-hosted-api
  ports:
    - name: http
      port: 80
      targetPort: http
