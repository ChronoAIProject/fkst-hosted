# Non-secret runtime configuration for the CONTROL-PLANE (issue #145).
#
# Keys mirror the controller's env contract
# (backend/fkst-control-plane/src/config.rs):
#   - MONGODB_DB                          logical database name
#   - MONGODB_SERVER_SELECTION_TIMEOUT_MS bounds the startup ping and /health
#   - FKST_HOSTED_LOG_LEVEL               tracing-subscriber EnvFilter directive
# MONGODB_URI is a credential and lives in the Secret (fkst-control-plane-secret).
# The worker's (non-DB) config lives in worker-configmap.yaml.
#
# Distribution / lease-takeover knobs (backend/.../src/leases/config.rs and
# .../src/distribution/config.rs). All are set to their in-code defaults here:
# explicit values make the multi-pod coordination posture visible and tunable
# for operators without rebuilding the image. Constraints (fail-closed at
# startup): TTL in 1..=86400; 0 < RENEW and RENEW*2 < TTL; SCAN > 0;
# GRACE may be 0; MAX_LOAD 0 = uncapped. FKST_POD_ID is NOT set here — it is
# injected per-pod from the downward API in the Deployment.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fkst-control-plane-config
  namespace: fkst-hosted
  labels:
    app.kubernetes.io/name: fkst-control-plane
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: fkst-hosted
data:
  MONGODB_DB: "fkst_hosted"
  MONGODB_SERVER_SELECTION_TIMEOUT_MS: "5000"
  FKST_HOSTED_LOG_LEVEL: "info,fkst_control_plane=debug,tower_http=info"
  # Lease + takeover cadences (defaults; see header for constraints).
  FKST_LEASE_TTL_SECS: "30"
  FKST_LEASE_RENEW_INTERVAL_SECS: "10"
  FKST_TAKEOVER_SCAN_INTERVAL_SECS: "5"
  FKST_TAKEOVER_GRACE_SECS: "2"
  FKST_PLACEMENT_MAX_LOAD: "0"
  # Authentication (NyxID JWT). FKST_AUTH_ENABLED defaults to true (fail-closed);
  # FKST_AUTH_NYXID_BASE_URL is required when enabled and lives here as a
  # non-secret endpoint URL (e.g. https://nyxid.example.com). Credentials are
  # never in the ConfigMap — only the public JWKS endpoint.
  FKST_AUTH_ENABLED: "true"
  FKST_AUTH_NYXID_BASE_URL: "https://nyxid.example.com"
  FKST_AUTH_ISSUER: "nyxid"
  FKST_AUTH_JWKS_CACHE_TTL_SECS: "300"
  # NyxID org-role and user-orgs cache TTL (seconds). Controls how stale
  # org membership data may be before a refresh. Default 30; zero rejected.
  FKST_NYXID_ORG_CACHE_TTL_SECS: "30"
  # GitHub App integration (optional; unset = disabled).
  # FKST_GITHUB_APP_ID: "12345"
  # FKST_GITHUB_APP_SLUG: "fkst-hosted"
  # The private key PEM goes in the Secret (FKST_GITHUB_APP_PRIVATE_KEY_PEM),
  # or mount a file and set FKST_GITHUB_APP_PRIVATE_KEY_PATH here.
  # FKST_GITHUB_APP_PRIVATE_KEY_PATH: "/etc/fkst-github-app/key.pem"
