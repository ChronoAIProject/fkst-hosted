# `kubectl apply -k backend/deploy/k8s` brings up the whole local stack.
#
# secret.example.yaml is DELIBERATELY excluded: the real Secret is created by
# the operator first (see secret.example.yaml header), and an apply must never
# overwrite it with placeholders.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fkst-hosted
resources:
  - namespace.yaml
  - configmap.yaml
  - worker-configmap.yaml
  - mongodb-service.yaml
  - mongodb-statefulset.yaml
  - control-plane-deployment.yaml
  - worker-deployment.yaml
  - api-service.yaml
  - pdb.yaml
# Image-tag seam: change the deployed tag in one place. Two images now (#145):
# the slim controller and the engine-laden worker.
# TRANSITIONAL (#145 → #136): build BOTH from this one Dockerfile —
#   fkst-worker:dev        from `--target worker-runtime` (needs FKST_SUBSTRATE_REF)
#   fkst-control-plane:dev from `--target worker-runtime` too (the controller
#                          still spawns engines until #136; switch it to
#                          `--target control-plane-runtime` then).
images:
  - name: fkst-control-plane
    newTag: dev
  - name: fkst-worker
    newTag: dev
# Replica edit-points. The control-plane range is 3..5 (keep >= 3 so the PDB
# minAvailable:2 has headroom); the database-free pivot (#135) collapses it to
# a single authoritative controller. The worker fleet scales freely (HPA #140).
replicas:
  - name: fkst-control-plane
    count: 3
  - name: fkst-worker
    count: 2
