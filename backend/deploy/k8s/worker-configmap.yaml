# Non-secret runtime configuration for the WORKER (issue #145).
#
# The worker never connects to MongoDB, so it carries NONE of the control-plane's
# DB / lease / auth / GitHub-App config. At the #145 skeleton stage only the log
# level applies. Later database-free issues add (here or in the worker Secret):
#   - CONTROLLER_URL + FKST_INTERNAL_AUTH_TOKEN (#134; token → worker Secret)
#   - NyxID + engine + runtime-root knobs (#136)
apiVersion: v1
kind: ConfigMap
metadata:
  name: fkst-worker-config
  namespace: fkst-hosted
  labels:
    app.kubernetes.io/name: fkst-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: fkst-hosted
data:
  FKST_HOSTED_LOG_LEVEL: "info,fkst_worker=debug"
