services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - fkst_mongo_data:/data/db
    environment:
      FKST_AUTH_ENABLED: "false"

  # Full-stack local testing of the control-plane/worker split (issue #145).
  # These build the two images from backend/Dockerfile and are gated behind the
  # `full` compose profile, so the DEFAULT `docker compose up` stays mongo-only
  # for the usual `cargo run -p fkst-control-plane` local-dev flow. To run them:
  #   export FKST_SUBSTRATE_REF="$(cat backend/engine.ref)"
  #   docker compose --profile full up --build
  # NOTE: the control-plane is fail-closed at startup — supply the rest of its
  # required config (e.g. FKST_HOSTED_VAULT_MASTER_KEY) via an env_file/.env.
  control-plane:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: backend/Dockerfile
      # TRANSITIONAL (#145 → #136): engine execution still lives in the
      # control-plane crate, so the controller runs from the engine-laden target
      # until #136 slims it to `--target control-plane-runtime`.
      target: worker-runtime
      args:
        FKST_SUBSTRATE_REF: ${FKST_SUBSTRATE_REF:?set FKST_SUBSTRATE_REF, e.g. export FKST_SUBSTRATE_REF="$(cat backend/engine.ref)"}
    command: ["/usr/local/bin/fkst-control-plane"]
    depends_on:
      - mongo
    ports:
      - "8080:8080"
    environment:
      FKST_ROLE: control-plane
      FKST_AUTH_ENABLED: "false"
      MONGODB_URI: "mongodb://mongo:27017/fkst_hosted"
      MONGODB_DB: "fkst_hosted"
    # The control-plane mounts no runtime volume (its end state). Transitional
    # engine runtime writes to the image's anonymous VOLUME.

  worker:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: backend/Dockerfile
      target: worker-runtime
      args:
        FKST_SUBSTRATE_REF: ${FKST_SUBSTRATE_REF:?set FKST_SUBSTRATE_REF, e.g. export FKST_SUBSTRATE_REF="$(cat backend/engine.ref)"}
    depends_on:
      - control-plane
    environment:
      FKST_ROLE: worker
      FKST_AUTH_ENABLED: "false"
    # The worker mounts the engine runtime volume (ready to host engine children
    # once #136 moves execution onto it).
    volumes:
      - fkst_worker_runtime:/var/lib/fkst/runtime

volumes:
  fkst_mongo_data:
  fkst_worker_runtime:
