# ==========================================================================
# TRANSITIONAL until #143 removes MongoDB. This StatefulSet (and the paired
# mongodb-service.yaml + the control-plane Deployment's wait-for-mongodb
# initContainer) exist only while the control plane is DB-backed. When #143
# lands the DB-free pivot, this whole Mongo pair is deleted mechanically.
# ==========================================================================
#
# Single-replica MongoDB for the local MVP. Durable storage comes from the
# volumeClaimTemplate (PVC data-mongodb-0), which is RETAINED across pod and
# StatefulSet deletion — deleting the PVC (or the namespace) is the explicit
# data wipe. MONGO_INITDB_ROOT_* initializes the root user only on FIRST boot
# against an empty data dir; rotating credentials requires a PVC wipe.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: fkst-hosted
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: fkst-hosted
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: fkst-hosted
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - name: mongo
              containerPort: 27017
          # Reads MONGO_INITDB_ROOT_USERNAME / MONGO_INITDB_ROOT_PASSWORD from
          # the single shared control-plane Secret (the same Secret the
          # control-plane container's envFrom also pulls — see README §4). The
          # username:password here MUST match the userinfo in MONGODB_URI.
          envFrom:
            - secretRef:
                name: fkst-control-plane-secret
          # Authenticated ping via mongosh (mongo:7.0 ships mongosh). Wrapped
          # in bash -c so the env vars expand inside the container. The
          # initialDelay/failureThreshold budget absorbs the first-init auth
          # race (the root user does not exist until the entrypoint finishes
          # initializing the empty data dir).
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - mongosh --quiet --username "$MONGO_INITDB_ROOT_USERNAME" --password "$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - mongosh --quiet --username "$MONGO_INITDB_ROOT_USERNAME" --password "$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand('ping').ok"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: mongodb
          app.kubernetes.io/component: database
          app.kubernetes.io/part-of: fkst-hosted
      spec:
        accessModes: ["ReadWriteOnce"]
        # No storageClassName: use the cluster default (kind/minikube/k3d/
        # docker-desktop all provision a default local class).
        resources:
          requests:
            storage: 5Gi
