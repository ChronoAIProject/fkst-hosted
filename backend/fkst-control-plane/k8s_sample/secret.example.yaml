# TEMPLATE ONLY — placeholders, never real credentials.
#
# This file is deliberately NOT listed in kustomization.yaml, so
# `kubectl apply -k` can never overwrite a real Secret with these placeholders.
#
# This is the CONTROL-PLANE Secret (fkst-control-plane-secret): the MongoDB URI
# + root creds, NyxID service creds, the GitHub-App PEM/webhook secret, and the
# shared controller<->worker internal-auth token. The WORKER holds none of the
# DB / GitHub-App creds — only its own copy of FKST_INTERNAL_AUTH_TOKEN (see
# backend/fkst-worker/k8s_sample/secret.example.yaml).
#
# Create the real Secret BEFORE `apply -k` (preferred — nothing touches disk):
#   PW="$(openssl rand -hex 16)"
#   TOK="$(openssl rand -hex 32)"   # share TOK with the worker Secret
#   kubectl -n fkst-hosted create secret generic fkst-control-plane-secret \
#     --from-literal=MONGO_INITDB_ROOT_USERNAME=root \
#     --from-literal=MONGO_INITDB_ROOT_PASSWORD="$PW" \
#     --from-literal=MONGODB_URI="mongodb://root:${PW}@mongodb-0.mongodb:27017/fkst_hosted?authSource=admin" \
#     --from-literal=FKST_INTERNAL_AUTH_TOKEN="$TOK"
#
# Filled-file alternative: copy this file to secret.yaml (git-ignored), replace
# every CHANGE_ME, then `kubectl apply -f .../k8s_sample/secret.yaml`.
#
# CONSISTENCY RULES:
#   - the user:pass in MONGODB_URI MUST equal MONGO_INITDB_ROOT_USERNAME /
#     MONGO_INITDB_ROOT_PASSWORD (mismatch = the #1 bring-up failure: API stays
#     NotReady with auth errors), and the URI must keep authSource=admin.
#   - FKST_INTERNAL_AUTH_TOKEN MUST equal the worker Secret's value.
apiVersion: v1
kind: Secret
metadata:
  name: fkst-control-plane-secret
  namespace: fkst-hosted
  labels:
    app.kubernetes.io/name: fkst-control-plane
    app.kubernetes.io/part-of: fkst-hosted
type: Opaque
stringData:
  # --- MongoDB (removed by #143/#144) ---
  # Required, fail-closed. Short-form host (mongodb-0.mongodb) resolves via the
  # pod's DNS search path, so the URI works in any namespace.
  MONGODB_URI: "mongodb://root:CHANGE_ME@mongodb-0.mongodb:27017/fkst_hosted?authSource=admin" # removed by #143/#144
  MONGO_INITDB_ROOT_USERNAME: "root" # removed by #143/#144
  MONGO_INITDB_ROOT_PASSWORD: "CHANGE_ME" # openssl rand -hex 16; must match URI  | removed by #143/#144

  # --- NyxID service-account credentials (org APIs) ---
  # Both-or-neither: only one set is a config error. Without these, org features
  # degrade gracefully (owner-only authorization).
  NYXID_CLIENT_ID: "CHANGE_ME"
  NYXID_CLIENT_SECRET: "CHANGE_ME"

  # --- GitHub journaling fallback token (optional) ---
  # GITHUB_TOKEN: "CHANGE_ME"

  # --- Shared controller<->worker bearer (#134; optional) ---
  # When absent the internal routes are not mounted. openssl rand -hex 32;
  # MUST equal the worker Secret's FKST_INTERNAL_AUTH_TOKEN.
  # FKST_INTERNAL_AUTH_TOKEN: "CHANGE_ME"

  # --- GitHub App (optional) ---
  # Inline PEM with literal \n escapes; mutually exclusive with
  # FKST_GITHUB_APP_PRIVATE_KEY_PATH in the ConfigMap.
  # FKST_GITHUB_APP_PRIVATE_KEY_PEM: "-----BEGIN RSA PRIVATE KEY-----\nCHANGE_ME\n-----END RSA PRIVATE KEY-----"
  # Webhook HMAC secret (#108); when unset the webhook route is not mounted.
  # FKST_GITHUB_APP_WEBHOOK_SECRET: "CHANGE_ME"
