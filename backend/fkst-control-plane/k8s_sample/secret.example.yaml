# TEMPLATE ONLY — placeholders, never real credentials.
#
# This file is deliberately NOT listed in kustomization.yaml, so
# `kubectl apply -k` can never overwrite a real Secret with these placeholders.
#
# This is the CONTROL-PLANE Secret (fkst-control-plane-secret): the GitHub-App
# PEM/webhook secret and the shared controller<->worker internal-auth token. The
# owner-only NyxID client (#257) needs NO service-account credential. The
# controller is datastore-free (#143) — there are no MongoDB credentials. The
# WORKER holds none of these creds — only its own copy of FKST_INTERNAL_AUTH_TOKEN
# (see backend/fkst-worker/k8s_sample/secret.example.yaml).
#
# Create the real Secret BEFORE `apply -k` (preferred — nothing touches disk):
#   TOK="$(openssl rand -hex 32)"   # share TOK with the worker Secret
#   kubectl -n fkst-hosted create secret generic fkst-control-plane-secret \
#     --from-literal=FKST_INTERNAL_AUTH_TOKEN="$TOK"
#
# Filled-file alternative: copy this file to secret.yaml (git-ignored), replace
# every CHANGE_ME, then `kubectl apply -f .../k8s_sample/secret.yaml`.
#
# CONSISTENCY RULE:
#   - FKST_INTERNAL_AUTH_TOKEN MUST equal the worker Secret's value.
apiVersion: v1
kind: Secret
metadata:
  name: fkst-control-plane-secret
  namespace: fkst-hosted
  labels:
    app.kubernetes.io/name: fkst-control-plane
    app.kubernetes.io/part-of: fkst-hosted
type: Opaque
stringData:
  # --- GitHub journaling fallback token (optional) ---
  # GITHUB_TOKEN: "CHANGE_ME"

  # --- Shared controller<->worker bearer (#134; optional) ---
  # When absent the internal routes are not mounted. openssl rand -hex 32;
  # MUST equal the worker Secret's FKST_INTERNAL_AUTH_TOKEN.
  # FKST_INTERNAL_AUTH_TOKEN: "CHANGE_ME"

  # --- GitHub App (optional) ---
  # Inline PEM with literal \n escapes; mutually exclusive with
  # FKST_GITHUB_APP_PRIVATE_KEY_PATH in the ConfigMap.
  # FKST_GITHUB_APP_PRIVATE_KEY_PEM: "-----BEGIN RSA PRIVATE KEY-----\nCHANGE_ME\n-----END RSA PRIVATE KEY-----"
  # Webhook HMAC secret (#108); when unset the webhook route is not mounted.
  # FKST_GITHUB_APP_WEBHOOK_SECRET: "CHANGE_ME"
