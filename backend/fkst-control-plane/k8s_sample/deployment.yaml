# fkst-control-plane: the controller deployable (public REST API). 3 replicas,
# safe-takeover RollingUpdate. SAMPLE manifest — every value here is an example;
# the config loaders (backend/fkst-control-plane/src/config.rs et al.) are the
# canonical source of truth for the env contract.
#
# TRANSITIONAL (until #151): engine execution still lives in the control-plane
# crate today, so this Deployment still spawns engine children and therefore
# (a) must run from the ENGINE-LADEN image — the `fkst-control-plane` image tag
# below is a kustomize seam (kustomization.yaml `images:`); transitionally point
# it at the engine-laden `fkst-worker` image (with a `command:` override to the
# fkst-control-plane binary) since the slim `backend/fkst-control-plane/Dockerfile`
# carries no engine — and (b) keeps the `runtime`+`tmp` emptyDir volumes below.
# When #151 moves engine execution onto the worker: switch this image to the
# slim `fkst-control-plane` image and drop the `runtime` volume + its mount, and
# the `FKST_HOSTED_ENGINE_*` ConfigMap keys move to the worker. The database-free
# pivot (#143/#144) collapses this to a SINGLE authoritative controller replica;
# until then it stays at 3.
#
# Cross-pod execution is serialized by the distribution layer's MongoDB lease +
# fencing token, NOT by the deployment strategy: at most one pod holds a given
# package's lease at a time, and every engine spawn / session write is tagged
# with the holder's fencing token so a stale (taken-over) holder is fenced out.
# That makes a RollingUpdate safe where the old single-instance contract needed
# Recreate — a terminating pod self-fences its own engine and releases its
# leases on graceful shutdown (SIGTERM), so a surviving pod takes over without
# two engines ever running the same package concurrently.
#
# maxUnavailable: 0 keeps full capacity during a rollout (no request gap);
# maxSurge: 1 rolls one extra pod at a time. The replica operating range is
# 3..5 — adjust via the `replicas:` edit-point in kustomization.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fkst-control-plane
  namespace: fkst-hosted
  labels:
    app.kubernetes.io/name: fkst-control-plane
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: fkst-hosted
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  # Selector is immutable after creation — keep it minimal (name only) so
  # label additions never force a Deployment recreate.
  selector:
    matchLabels:
      app.kubernetes.io/name: fkst-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fkst-control-plane
        app.kubernetes.io/component: control-plane
        app.kubernetes.io/part-of: fkst-hosted
    spec:
      # Docker-link-style service env injection MUST stay off: the Service is
      # named fkst-hosted, so Kubernetes would inject FKST_HOSTED_PORT =
      # "tcp://<clusterIP>:80" into the pod — colliding with the API's
      # FKST_HOSTED_* env prefix (parsed as PORT) and failing the fail-closed
      # config loader at startup. The API's env comes exclusively from the
      # image, the ConfigMap, and the Secret.
      enableServiceLinks: false
      # PREFERRED (soft) anti-affinity: spread replicas across nodes when the
      # cluster is multi-node. Intentionally NOT required — docker-desktop is
      # single-node, and a required rule would leave replicas 2..N Pending
      # forever. On a real multi-node cluster this nudges spreading for fault
      # tolerance without ever blocking scheduling.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: fkst-control-plane
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      # TRANSITIONAL until #143 removes MongoDB: the server is FAIL-CLOSED at
      # startup (it pings Mongo and exits if the store is unreachable), so
      # first-boot ordering would otherwise crash-loop the API while Mongo
      # initializes. Waiting for the TCP port absorbs that ordering without
      # weakening the fail-closed contract. When #143 lands, this initContainer
      # disappears together with the Mongo Service/StatefulSet.
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.37
          command:
            - sh
            - -c
            - until nc -z -w 2 mongodb-0.mongodb 27017; do sleep 2; done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
      containers:
        - name: fkst-control-plane
          # tag managed by kustomization.yaml images. TRANSITIONAL: build this
          # from `--target worker-runtime` (engine-laden) until #136 — see header.
          image: fkst-control-plane:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          # Pod identity is an INTENTIONAL contract, not the ambient HOSTNAME
          # coincidence: FKST_POD_ID is sourced explicitly from the downward
          # API (metadata.name) so the distribution layer's holder_pod / pod_id
          # is the pod's stable, unique name. (The config loader's fallback is
          # FKST_POD_ID -> HOSTNAME -> local-<uuid>; wiring it explicitly here
          # is defense-in-depth so identity never silently degrades.)
          env:
            - name: FKST_POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: fkst-control-plane-config
            - secretRef:
                name: fkst-control-plane-secret
          # Belt-and-suspenders drain: sleep before SIGTERM so the Service /
          # endpoints controller deregisters this pod (readiness still passing
          # at this instant) and in-flight requests stop arriving BEFORE the
          # process begins its graceful-shutdown (self-fence + lease release).
          # Bounded well under terminationGracePeriodSeconds (30s).
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 2"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Root FS is read-only, so every writable path is an explicit
          # emptyDir. Engine runtime state is LOCAL and intentionally
          # ephemeral (redo-from-GitHub-truth model) — never a PVC.
          volumeMounts:
            - name: runtime
              mountPath: /var/lib/fkst/runtime # = FKST_RUNTIME_ROOT (image env)
            - name: tmp
              mountPath: /tmp
          # /health pings Mongo (bounded by MONGODB_SERVER_SELECTION_TIMEOUT_MS
          # = 5s), so probe timeouts are 7s to let a degraded 503 arrive
          # instead of timing out. Liveness is TCP-only: it MUST NOT depend on
          # Mongo, or a DB blip would restart-loop the API.
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 2
            timeoutSeconds: 7
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 7
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: runtime
          emptyDir: {}
        - name: tmp
          emptyDir: {}
