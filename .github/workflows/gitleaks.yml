name: gitleaks

on:
  pull_request:
    branches: [develop, develop-auto]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    env:
      # Pinned: the gitleaks CLI surface changed at 8.19 (detect -> git/dir), so
      # the version and the `dir` subcommand below must move together. The OSS
      # binary is used directly (the official gitleaks-action requires a license
      # key for organisation accounts; the binary does not).
      GITLEAKS_VERSION: 8.21.2
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan working tree for secrets
        run: gitleaks dir . --config .gitleaks.toml --redact --no-banner --verbose --exit-code 1
