# On merge to `main`: tag vX.Y.Z (version from package.json) and create a GitHub
# Release whose body is the release note. Then open + merge a lazy cleanup PR
# into `develop` that consumes the released changesets, removes the dated release
# note, and freezes the CHANGELOG entry. `main` is never committed to directly.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    name: Tag and GitHub Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.rel.outputs.released }}
      version: ${{ steps.rel.outputs.version }}
      changesets: ${{ steps.rel.outputs.changesets }}
      note: ${{ steps.rel.outputs.note }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - id: rel
        name: Tag and release when the version is new
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          V=$(node -p "require('./package.json').version")
          TAG="v$V"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "INFO: package version $V (tag $TAG)"

          if git rev-parse "$TAG" >/dev/null 2>&1 || gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "INFO: $TAG already exists; nothing to release."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NOTE=$(ls release-notes/release-note-*.md 2>/dev/null | head -1 || true)
          if [ -z "$NOTE" ]; then
            echo "::error::No release-notes/release-note-*.md at the main tip; cannot build release $TAG."
            exit 1
          fi
          echo "INFO: release note: $NOTE"

          CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -ivE '/README\.md$' | paste -sd, - || true)
          echo "note=$NOTE" >> "$GITHUB_OUTPUT"
          echo "changesets=$CHANGESETS" >> "$GITHUB_OUTPUT"

          # Release body = the note with its leading instructional HTML comment stripped.
          node -e "const fs=require('fs');let s=fs.readFileSync(process.argv[1],'utf8').replace(/^﻿/,'').trimStart();if(s.startsWith('<!--')){const i=s.indexOf('-->');if(i!==-1)s=s.slice(i+3).trimStart();}fs.writeFileSync('/tmp/body.md',s)" "$NOTE"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes-file /tmp/body.md --target "$GITHUB_SHA"
          echo "INFO: tagged and released $TAG."
          echo "released=true" >> "$GITHUB_OUTPUT"

  cleanup:
    name: Post-release cleanup into develop
    needs: tag-and-release
    if: needs.tag-and-release.outputs.released == 'true'
    runs-on: ubuntu-latest
    # `pull-requests: write` is required for the `gh pr create` below; the
    # top-level block only grants `contents: write`. (The repo setting "Allow
    # GitHub Actions to create and approve pull requests" must also be enabled —
    # see issue #242 — or createPullRequest is still rejected.)
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Open and merge cleanup PR into develop
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.tag-and-release.outputs.version }}
          CHANGESETS: ${{ needs.tag-and-release.outputs.changesets }}
          NOTE: ${{ needs.tag-and-release.outputs.note }}
        run: |
          set -euo pipefail

          BR="chore/release-cleanup-v${VERSION}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if git ls-remote --exit-code --heads origin "$BR" >/dev/null 2>&1; then
            echo "INFO: cleanup branch $BR already exists; skipping."
            exit 0
          fi

          git checkout -b "$BR"

          # Delete exactly the changesets consumed by this release.
          IFS=',' read -ra CS <<< "${CHANGESETS:-}"
          for f in "${CS[@]}"; do
            [ -n "$f" ] && rm -f "$f"
          done
          # Delete this release's dated note file (the template is kept).
          [ -n "${NOTE:-}" ] && rm -f "$NOTE"
          # Freeze the pending CHANGELOG entry into a permanent one.
          node scripts/release/changelog.mjs freeze

          if [ -z "$(git status --porcelain)" ]; then
            echo "INFO: nothing to clean up for v${VERSION}."
            exit 0
          fi

          git add -A
          git commit -m "chore(release): clean up after v${VERSION}"
          git push origin "$BR"

          gh pr create --repo "$GITHUB_REPOSITORY" --base develop --head "$BR" \
            --label release-automation \
            --title "chore(release): clean up after v${VERSION}" \
            --body "Automated post-release cleanup for v${VERSION}: consume the released changesets, remove the dated release-note file, and freeze the CHANGELOG entry. The release-note template is kept."

          # develop allows self-merge (0 approvals). Retry while GitHub computes mergeability.
          for i in 1 2 3 4 5; do
            if gh pr merge "$BR" --repo "$GITHUB_REPOSITORY" --merge --delete-branch; then
              echo "INFO: cleanup PR merged for v${VERSION}."
              exit 0
            fi
            echo "INFO: cleanup PR not mergeable yet (attempt $i); waiting..."
            sleep 10
          done
          echo "::warning::Cleanup PR for v${VERSION} was opened but not auto-merged; please merge it manually."
