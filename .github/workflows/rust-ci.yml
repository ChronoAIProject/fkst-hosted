name: Rust CI

on:
  pull_request:
    branches: [develop, develop-auto]

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: rust lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show && rustup component add rustfmt clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: rustfmt --check
        run: cargo fmt --all -- --check
      - name: clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: rust build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: build
        run: cargo build --workspace --locked

  test:
    name: rust test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: test
        run: cargo test --workspace --locked
