# Gate: every PR from `develop` into `main` must include a complete release note.
# Skipped for automated release PRs (label: release-automation).
name: Require release note

on:
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  require-release-note:
    name: Release note required
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release note present and complete
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          IS_AUTOMATION: ${{ contains(github.event.pull_request.labels.*.name, 'release-automation') }}
        run: |
          set -euo pipefail

          if [ "$IS_AUTOMATION" = "true" ]; then
            echo "INFO: 'release-automation' PR — release-note gate skipped."
            exit 0
          fi

          # `gh pr view --json files` caps at 100 files, so a large release PR
          # (e.g. the first release: hundreds of changed files) can hide the
          # release note past the cap and fail this gate spuriously. Page the
          # full file list via the API instead.
          # NOTE: the REST "list PR files" endpoint returns `filename` (NOT
          # `path` — that field only exists on `gh pr view --json files`). Using
          # `.path` here yields all-null and the gate never finds the note.
          # Filter to `status == "added"`: a release-prepare PR ADDS exactly one
          # dated note, while every release also REMOVES the previous release's
          # note (it was consumed and cleaned from develop). Without this filter,
          # `head -1` picks the older removed note (its timestamp sorts first),
          # which is absent from the checkout, and the gate fails spuriously.
          NOTE=$(gh api --paginate "repos/$REPO/pulls/$PR/files" \
            --jq '.[] | select(.status == "added") | .filename' \
            | grep -E '^release-notes/release-note-[0-9]{8}-[0-9]{4}\.md$' | head -1 || true)

          if [ -z "$NOTE" ]; then
            echo "::error::A develop → main PR must add release-notes/release-note-YYYYMMDD-HHMM.md (copy .github/release-note-template.md and fill it in)."
            exit 1
          fi
          echo "INFO: release note: $NOTE"

          if [ ! -f "$NOTE" ]; then
            echo "::error::Release note $NOTE was not found in the checkout."
            exit 1
          fi

          for sec in '## Fixed' '## New Feature' '## Changed'; do
            if ! grep -qF "$sec" "$NOTE"; then
              echo "::error::Release note $NOTE is missing the '$sec' section."
              exit 1
            fi
          done

          if grep -qF '(write here)' "$NOTE"; then
            echo "::error::Release note $NOTE still contains '(write here)' placeholders — fill them in."
            exit 1
          fi

          echo "INFO: release note present with all three sections and no placeholders. Check passed."
