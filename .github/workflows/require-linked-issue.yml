# Governance: every PR must have a corresponding GitHub issue.
# Primary signal: GitHub's own closing-issue references (what auto-closes on merge).
# Fallback: a closing keyword + #number in the PR body.
name: Require linked issue

on:
  pull_request:
    branches: [main, develop, develop-auto]
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  require-linked-issue:
    name: Linked issue required
    runs-on: ubuntu-latest
    steps:
      - name: Verify the PR links a closing issue
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          IS_AUTOMATION: ${{ contains(github.event.pull_request.labels.*.name, 'release-automation') }}
        run: |
          set -euo pipefail

          if [ "$IS_AUTOMATION" = "true" ]; then
            echo "INFO: 'release-automation' PR — linked-issue gate skipped."
            exit 0
          fi

          echo "INFO: Checking PR #${NUMBER} for a linked/closing issue."

          # 1) Primary: issues GitHub recognizes as auto-closing for this PR.
          COUNT=$(gh api graphql \
            -f query='
              query($owner:String!, $repo:String!, $number:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$number) {
                    closingIssuesReferences(first:10) { totalCount }
                  }
                }
              }' \
            -F owner="${OWNER}" -F repo="${REPO}" -F number="${NUMBER}" \
            --jq '.data.repository.pullRequest.closingIssuesReferences.totalCount')
          echo "INFO: GitHub closing-issue references: ${COUNT:-0}"

          if [ "${COUNT:-0}" -gt 0 ]; then
            echo "INFO: PR is linked to ${COUNT} closing issue(s). Check passed."
            exit 0
          fi

          # 2) Fallback: closing keyword + #number anywhere in the PR body.
          if printf '%s' "${PR_BODY:-}" | grep -iEq '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+'; then
            echo "INFO: Found a closing keyword referencing an issue (e.g. 'Closes #N') in the PR body. Check passed."
            exit 0
          fi

          echo "::error::Every PR must reference a corresponding GitHub issue. Add a closing reference such as 'Closes #123' to the PR description."
          exit 1
