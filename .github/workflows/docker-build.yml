name: Docker build

on:
  pull_request:
    branches: [develop, develop-auto]

permissions:
  contents: read

jobs:
  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Read-only: the build never pushes, so the checkout token must not
          # linger in .git/config for the docker build context to pick up.
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Build the control-plane image's server stage. We stop at `server-builder`
      # on purpose: the engine-laden runtime stage compiles fkst-substrate from
      # the private upstream repo (needs a cross-repo token + a long engine
      # build), whereas the server stage is the part this repo's changes can
      # break — it exercises backend/Dockerfile's COPY paths and the `--locked`
      # release build of the control-plane binary. The GHA cache keeps reruns fast.
      - name: Build control-plane image (server stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          target: server-builder
          push: false
          load: false
          tags: fkst-control-plane:ci
          cache-from: type=gha,scope=control-plane
          cache-to: type=gha,mode=max,scope=control-plane
